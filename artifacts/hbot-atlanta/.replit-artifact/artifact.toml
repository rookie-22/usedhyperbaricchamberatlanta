kind = "web"
previewPath = "/"
title = "Used Hyperbaric Chamber Atlanta"
version = "1.0.0"
id = "artifacts/hbot-atlanta"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20815

[services.development]
run = "pnpm --filter @workspace/hbot-atlanta run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hbot-atlanta", "run", "build" ]
publicDir = "artifacts/hbot-atlanta/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20815"
BASE_PATH = "/"
